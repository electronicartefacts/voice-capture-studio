name: Feature request
description: Suggest a product, corpus, export, or developer-experience improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, UI, or documentation change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Capture runtime
        - Corpus
        - Workspace
        - Export
        - Documentation
        - Developer experience
        - Other
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy impact
      description: Note any impact on recordings, browser storage, exports, or network behavior.
    validations:
      required: true
